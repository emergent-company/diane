name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            name: diane-darwin-arm64
          - goos: darwin
            goarch: amd64
            name: diane-darwin-amd64
          - goos: linux
            goarch: amd64
            name: diane-linux-amd64
          - goos: linux
            goarch: arm64
            name: diane-linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: server/go.sum

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          cd server/cmd/diane
          go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o ../../../dist/diane .

      - name: Compress binary
        run: |
          cd dist
          tar -czvf ${{ matrix.name }}.tar.gz diane
          sha256sum ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            dist/${{ matrix.name }}.tar.gz
            dist/${{ matrix.name }}.tar.gz.sha256

  companion:
    name: Build Companion App
    runs-on: macos-14
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install tools
        run: |
          brew install xcodegen create-dmg

      - name: Download diane binary
        uses: actions/download-artifact@v4
        with:
          name: diane-darwin-arm64
          path: server/swift/DianeCompanion/Resources/

      - name: Extract binary
        run: |
          mkdir -p server/swift/DianeCompanion/Resources
          cd server/swift/DianeCompanion/Resources
          tar xzf diane-darwin-arm64.tar.gz 2>/dev/null || true
          chmod +x diane 2>/dev/null || true
          rm -f diane-darwin-arm64.tar.gz

      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: server/swift/DianeCompanion

      - name: Import signing certificate (if available)
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: temp-keychain-password
        run: |
          if [ -z "$CERTIFICATE_BASE64" ]; then
            echo "No signing certificate configured — skipping import"
            exit 0
          fi
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_BASE64" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build and package (signed if cert available)
        run: |
          chmod +x Scripts/build-dmg.sh
          if [ -n "$DEVELOPMENT_TEAM" ]; then
            ./Scripts/build-dmg.sh --notarize
          else
            ./Scripts/build-dmg.sh --no-sign
          fi
        working-directory: server/swift/DianeCompanion
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM || '' }}
          NOTARIZE_APPLE_ID: ${{ secrets.NOTARIZE_APPLE_ID || '' }}
          NOTARIZE_PASSWORD: ${{ secrets.NOTARIZE_PASSWORD || '' }}
          NOTARIZE_TEAM_ID: ${{ secrets.NOTARIZE_TEAM_ID || '' }}

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: diane-companion-dmg
          path: server/swift/DianeCompanion/build/Diane-*.dmg

  release:
    name: Release
    needs: [build, companion]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          cat *.sha256 > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
            dist/Diane-*.dmg
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
