name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.11.0)'
        required: true
        type: string
      pre-release:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean
      dry-run:
        description: 'Build artifacts but do NOT create GitHub release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || github.sha }}
  cancel-in-progress: false

env:
  GO_VERSION: '1.23'
  XCODE_VERSION: '16.1'

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      version: ${{ steps.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate version format
        id: validate
        run: |
          VERSION="${{ inputs.version }}"
          # Strip leading 'v' if present, add it back
          VER="${VERSION#v}"
          if ! echo "$VER" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "❌ Invalid version format: $VERSION"
            echo "   Must be like v1.11.0 or 1.11.0"
            exit 1
          fi
          VERSION="v$VER"

          # Check against latest tag
          LATEST=$(git tag -l 'v*' --sort=-version:refname | head -1)
          if [ -z "$LATEST" ]; then
            echo "No existing tags — allowing first release"
          else
            # Simple semver comparison
            OLD="${LATEST#v}"
            NEW="$VER"
            if [ "$OLD" = "$NEW" ]; then
              echo "❌ Version $VERSION already exists as tag $LATEST"
              exit 1
            fi
            # Check major.minor.patch
            IFS='.' read -ra OLD_PARTS <<< "$OLD"
            IFS='.' read -ra NEW_PARTS <<< "$NEW"
            for i in 0 1 2; do
              if [ "${NEW_PARTS[$i]}" -gt "${OLD_PARTS[$i]}" ]; then
                break
              fi
              if [ "${NEW_PARTS[$i]}" -lt "${OLD_PARTS[$i]}" ]; then
                echo "❌ Version $VERSION is older than latest tag $LATEST"
                exit 1
              fi
            done
          fi
          echo "✅ Version $VERSION is valid (latest: $LATEST)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREV=$(git tag -l 'v*' --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV" ]; then
            echo "changelog=Initial release" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LOG=$(git log --oneline --no-decorate "$PREV..HEAD" 2>/dev/null || echo "")
          if [ -z "$LOG" ]; then
            echo "⚠️  No new commits since $PREV — continuing anyway"
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  build:
    name: Build CLI (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            name: diane-darwin-arm64
          - goos: darwin
            goarch: amd64
            name: diane-darwin-amd64
          - goos: linux
            goarch: amd64
            name: diane-linux-amd64
          - goos: linux
            goarch: arm64
            name: diane-linux-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name != '' && github.ref || github.sha }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: server/go.sum

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${{ needs.validate.outputs.version || github.ref_name }}"
          cd server/cmd/diane
          go build -ldflags="-s -w -X main.Version=${VERSION}" -o ../../../dist/diane .

      - name: Compress binary
        run: |
          cd dist
          tar -czvf ${{ matrix.name }}.tar.gz diane
          sha256sum ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            dist/${{ matrix.name }}.tar.gz
            dist/${{ matrix.name }}.tar.gz.sha256

  companion:
    name: Build Companion App
    runs-on: macos-15
    needs: [validate, build]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name != '' && github.ref || github.sha }}

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app \
            || sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer \
            || true

      - name: Install tools
        run: |
          brew install xcodegen create-dmg

      - name: Download diane binary
        uses: actions/download-artifact@v4
        with:
          name: diane-darwin-arm64
          path: server/swift/DianeCompanion/Resources/

      - name: Extract binary
        run: |
          mkdir -p server/swift/DianeCompanion/Resources
          cd server/swift/DianeCompanion/Resources
          tar xzf diane-darwin-arm64.tar.gz
          chmod +x diane
          rm -f diane-darwin-arm64.tar.gz

      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: server/swift/DianeCompanion

      - name: Import signing certificate (if available)
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: temp-keychain-password
        run: |
          if [ -z "$CERTIFICATE_BASE64" ]; then
            echo "No signing certificate configured — skipping import"
            exit 0
          fi
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_BASE64" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build and package
        run: |
          chmod +x Scripts/build-dmg.sh
          if [ -n "$DEVELOPMENT_TEAM" ]; then
            ./Scripts/build-dmg.sh --notarize
          else
            ./Scripts/build-dmg.sh --no-sign
          fi
        working-directory: server/swift/DianeCompanion
        env:
          VERSION: ${{ needs.validate.outputs.version || github.ref_name }}
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM || '' }}
          NOTARIZE_APPLE_ID: ${{ secrets.NOTARIZE_APPLE_ID || '' }}
          NOTARIZE_PASSWORD: ${{ secrets.NOTARIZE_PASSWORD || '' }}
          NOTARIZE_TEAM_ID: ${{ secrets.NOTARIZE_TEAM_ID || '' }}

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: diane-companion-dmg
          path: server/swift/DianeCompanion/build/Diane-*.dmg

  release:
    name: Release
    needs: [validate, build, companion]
    runs-on: ubuntu-latest
    # Skip actual GitHub release on dry-run
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry-run) }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          cat *.sha256 > checksums.txt

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ needs.validate.outputs.version || github.ref_name }}"
          PREV=$(git tag -l 'v*' --sort=-version:refname | head -2 | tail -1 || echo "")
          NOTES="# Diane ${VERSION}\n\n"
          if [ -n "$PREV" ]; then
            NOTES+="## Changes since ${PREV}\n\n"
            LOG=$(git log --oneline --no-decorate "${PREV}..HEAD" 2>/dev/null || echo "No new commits")
            while IFS= read -r line; do
              NOTES+="- ${line}\n"
            done <<< "$LOG"
            NOTES+="\n"
          fi
          NOTES+="## Assets\n"
          NOTES+="- CLI binaries (tar.gz) for darwin-arm64, darwin-amd64, linux-amd64, linux-arm64\n"
          NOTES+="- Diane macOS app (DMG) with auto-update support\n"
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          printf "%b" "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
            dist/Diane-*.dmg
          body: ${{ steps.notes.outputs.notes }}
          generate_release_notes: false
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.pre-release || contains(github.ref_name, '-') }}
          tag_name: ${{ needs.validate.outputs.version || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  auto-tag:
    name: Create Git Tag
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch' && !inputs.dry-run
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push tag
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          git config user.name "Diane Release Bot"
          git config user.email "bot@emergent-company.ai"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"
          echo "✅ Created and pushed tag $VERSION"
