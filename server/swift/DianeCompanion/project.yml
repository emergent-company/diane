name: Diane
options:
  bundleIdPrefix: com.emergent-company
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  indentWidth: 4
  tabWidth: 4

settings:
    base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.emergent-company.diane-companion
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        OTHER_LDFLAGS: ["-Wl,-no_warn_weak_import_dylib"]

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    version: 2.7.0

targets:
  Diane:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Sources
        excludes:
          - "**/*.plist"
          - "**/*.entitlements"
    dependencies:
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_NAME: Diane
        INFOPLIST_FILE: DianeCompanion/Info.plist
        CODE_SIGN_ENTITLEMENTS: DianeCompanion/DianeCompanion.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"
    postbuildScripts:
      - script: |
          # Download diane CLI for current architecture (skip if already present from CI)
          ARCH=$(uname -m)
          RESOURCES="${TARGET_BUILD_DIR}/${PRODUCT_NAME}.app/Contents/Resources"
          mkdir -p "$RESOURCES"
          if [ -f "${RESOURCES}/diane" ] && [ -s "${RESOURCES}/diane" ]; then
            echo "diane binary already present (size: $(stat -f%z "${RESOURCES}/diane")) — skipping download"
            chmod +x "${RESOURCES}/diane"
          else
            if [ "$ARCH" = "arm64" ]; then
              BINARY="diane-darwin-arm64.tar.gz"
            else
              BINARY="diane-darwin-amd64.tar.gz"
            fi
            echo "Downloading ${BINARY} from latest release..."
            curl -sL --connect-timeout 10 -o "/tmp/${BINARY}" "https://github.com/emergent-company/diane/releases/latest/download/${BINARY}"
            tar xzf "/tmp/${BINARY}" -C "${RESOURCES}" 2>/dev/null && echo "Extracted ${BINARY}" || echo "Warning: download failed, diane CLI not bundled"
            rm -f "/tmp/${BINARY}"
            chmod +x "${RESOURCES}/diane" 2>/dev/null || true
          fi
        name: "Download diane CLI"
        outputFiles:
          - "$(TARGET_BUILD_DIR)/$(PRODUCT_NAME).app/Contents/Resources/diane"
    info:
      path: DianeCompanion/Info.plist
    entitlements:
      path: DianeCompanion/DianeCompanion.entitlements

  DianeTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: DianeTests
    dependencies:
      - target: Diane
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Diane.app/Contents/MacOS/Diane"
